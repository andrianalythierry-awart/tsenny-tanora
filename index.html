<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tsen'ny Tanora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-white p-6"> <div class="bg-amber-500 text-gray-900 p-6 rounded-xl mb-8 text-center">
    <h2 class="text-2xl font-bold mb-2">Tu as du talent ? Rejoins la communauté Tsen'ny Tanora !</h2>
    <p class="mb-4">Inscris-toi gratuitement pour accéder à des missions et trouver des clients sérieux.</p>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSd-wS8w4e2KUQsN2QCW-5vfMLx-JIi0mN2TTmf1sZw1rueoNg/viewform" 
       class="inline-block bg-gray-900 text-amber-500 font-bold py-2 px-6 rounded-lg hover:bg-gray-800 transition">
       Je m'inscris pour devenir prestataire
    </a>
</div>
    <h1 class="text-3xl font-bold mb-8 text-amber-500">Tsen'ny Tanora</h1>
    <div id="flux-missions" class="grid gap-6">Chargement...</div>

    <script>
        const supabaseClient = supabase.createClient(
            "https://ovzrnzhhqrpomoxaflkv.supabase.co",
            "sb_publishable_w-weMY2zcEjZ4ouMq55ZGA_P2E_kUQA"
        );

        async function init() {
            const container = document.getElementById('flux-missions');
            try {
                const { data, error } = await supabaseClient.from('missions').select('*');
                if (error) throw error;
                
                container.innerHTML = data.map(m => `
                    <div class="bg-gray-900 border border-gray-700 p-6 rounded-xl hover:border-amber-500 transition">
                        <h3 class="font-bold text-xl text-amber-100">${m.titre}</h3>
                        <p class="text-gray-400 mt-2 italic">${m.description || 'Service disponible'}</p>
                        <p class="text-amber-500 font-bold mt-4 mb-4">${m.budget} Ar</p>
                        <a href="https://wa.me/261384465217?text=Bonjour, je souhaite réserver la mission : ${encodeURIComponent(m.titre)}" 
                           class="block text-center bg-amber-500 text-gray-900 font-bold py-2 rounded-lg hover:bg-amber-400">
                           Réserver via WhatsApp
                        </a>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = "Erreur de chargement.";
                console.error(e);
            }
        }
        init();
    </script>
</body>
</html>
