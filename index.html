<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsen'ny Tanora - Jobs Rapides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans">
    <header class="sticky top-0 bg-gray-900/90 backdrop-blur-md border-b border-gray-800 px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-extrabold text-amber-500">Tsen'ny Tanora</h1>
    </header>

    <main class="max-w-md mx-auto px-4 py-6">
        <div id="flux-missions" class="space-y-4">
            <div class="text-center py-8 text-gray-500">Chargement...</div>
        </div>
    </main>

    <script>
        // Initialisation propre
        const supabase = window.supabase.createClient(
            "https://ovzrnzhhqrpomoxaflkv.supabase.co",
            "sb_publishable_w-weMY2zcEjZ4ouMq55ZGA_P2E_kUQA"
        );

        async function chargerMissions() {
            const conteneur = document.getElementById('flux-missions');
            const { data, error } = await supabase.from('missions').select('*');
            
            if (error) {
                conteneur.innerHTML = '<div class="text-red-500">Erreur chargement.</div>';
                return;
            }

            conteneur.innerHTML = data.map(job => `
                <div class="bg-gray-900 p-4 rounded-xl border border-gray-800">
                    <h3 class="font-bold">${job.titre}</h3>
                    <p class="text-sm text-gray-400">${job.budget} Ar</p>
                </div>
            `).join('');
        }

        chargerMissions();
    </script>
</body>
</html>
