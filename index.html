<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tsen'ny Tanora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement direct de la bibliothèque -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-white p-4">
    <h1 class="text-xl font-bold mb-4">Tsen'ny Tanora</h1>
    <div id="flux-missions">Chargement...</div>

    <script>
        // On attend que la librairie soit bien chargée
        window.addEventListener('load', async () => {
            try {
                const supabase = window.supabase.createClient(
                    "https://ovzrnzhhqrpomoxaflkv.supabase.co",
                    "sb_publishable_w-weMY2zcEjZ4ouMq55ZGA_P2E_kUQA"
                );

                const { data, error } = await supabase.from('missions').select('*');
                
                if (error) throw error;

                document.getElementById('flux-missions').innerHTML = data.map(job => `
                    <div class="bg-gray-900 p-4 mb-2 rounded border border-gray-700">
                        <p class="font-bold">${job.titre}</p>
                        <p class="text-sm text-gray-400">${job.budget} Ar</p>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('flux-missions').innerHTML = "Erreur : " + err.message;
            }
        });
    </script>
</body>
</html>
